<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackjackPro Studio — Optimal Blackjack</title>
<meta name="description" content="Optimal Blackjack — the ultimate blackjack trainer: strategy, card counting, advantage analysis and community. By BlackjackPro Studio.">
<style>
  :root{
    --bg:#050805; --panel:#0e1a0e; --felt:#1a4a1a;
    --gold:#ffd700; --gold-dim:#ffa500;
    --text:#f2f4f2; --muted:#9fb39f; --line:rgba(255,215,0,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(26,74,26,.55), transparent 60%),
      var(--bg);
    color:var(--text);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:48px 20px;
    line-height:1.55;
  }
  .wrap{width:100%; max-width:560px; text-align:center}
  .badge{
    display:inline-block; font-size:12px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--gold);
    border:1px solid var(--line); border-radius:999px;
    padding:6px 14px; margin-bottom:26px;
  }
  h1{
    font-size:34px; font-weight:800; letter-spacing:-.5px; margin-bottom:6px;
    background:linear-gradient(180deg,#fff, #d9e6d9);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{color:var(--muted); font-size:16px; margin-bottom:34px}
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    padding:26px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .tag{
    color:var(--gold-dim); font-size:13px; letter-spacing:.14em;
    text-transform:uppercase; margin-bottom:14px;
  }
  .cta{
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    width:100%;
    background:linear-gradient(180deg,var(--gold),var(--gold-dim));
    color:#1a1200; font-weight:800; font-size:16px;
    text-decoration:none;
    padding:15px 20px; border-radius:12px;
    transition:transform .12s ease, filter .12s ease;
  }
  .cta:hover{transform:translateY(-1px); filter:brightness(1.05)}
  .links{
    margin-top:24px; display:flex; flex-wrap:wrap; justify-content:center;
    gap:8px 22px; font-size:14px;
  }
  .links a{color:var(--text); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .12s}
  .links a:hover{border-bottom-color:var(--gold)}
  .foot{margin-top:40px; color:var(--muted); font-size:13px}
  .foot a{color:var(--muted)}
</style>
</head>
<body>
  <main class="wrap">
    <span class="badge">BlackjackPro Studio</span>
    <h1>Optimal Blackjack</h1>
    <p class="sub">The ultimate blackjack trainer — strategy, card counting, advantage analysis &amp; community.</p>

    <div class="card">
      <div class="tag">Get the app</div>
      <a class="cta" href="https://play.google.com/store/apps/details?id=com.optimalblackjack.app">
        ♠ Download on Google Play
      </a>
      <div class="links">
        <a href="mailto:blackjackpro.studio@gmail.com">Support</a>
        <a href="https://blackjack-pro-fd9d8.web.app/privacy.html">Privacy Policy</a>
        <a href="https://blackjack-pro-fd9d8.web.app/terms.html">Terms</a>
      </div>
    </div>

    <p class="foot">© <span id="y"></span> BlackjackPro Studio · Argostoli, Greece · <a href="mailto:blackjackpro.studio@gmail.com">blackjackpro.studio@gmail.com</a></p>
  </main>
  <script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
